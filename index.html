<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="menu.css" />
    <link rel="stylesheet" href="index.css"/>
    <title>第10回けやき祭</title>
  </head>
  <body>    
    <header>
        <div class="keyakifes">第10回<br>古河中等教育学校文化祭<br>けやき祭</div> 
        <div class="poster"></div>
    </header>  

    <div class="grid"> 
      <div class="item violet">
        <h2>事前登録</h2>
      </div>

      <div class="item orange">
        <h2>模擬店</h2>
      </div>

      <div class="item skyblue">  
        <h2>アクセス</h2>
      </div>
    </div>

    <div class="inform">
      一般公開の注意点について
    </div>
  
    <aside>
        <div class="hamburger" onclick="toggleMenu()">
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
        </div>
        
    <div class="menu" id="menu">
      <ul>
        <li><a href="index.html">ホーム</a></li>
        <li><a href="mogi.html">模擬店</a></li>
        <li><a href="https://keyaki.app/notice">事前登録</a></li> 
        <li><a href="https://keyaki.app/timeTable">タイムテーブル</a></li>
      </ul>
    </div>
    

    <script>
      // メニューの表示/非表示を切り替える関数
      function toggleMenu() {
        const menu = document.getElementById("menu");
        menu.classList.toggle("open"); // メニューが開く・閉じるの切り替え
      }

      // メニュー項目がクリックされた時の処理
      document.querySelectorAll(".menu ul li a").forEach((link) => {
        link.addEventListener("click", function (event) {   
          event.preventDefault(); // デフォルトのリンク遷移を防ぐ
          const href = link.getAttribute("href");
          window.location.href = href; // 新しいページへ遷移（現在のタブ）
        });
      });
    </script>
    </aside>
  </body>
</html>
